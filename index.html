<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sonsie Carpentry | Renovations & Bathroom Renovations</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050705;
  color: white;
}

header {
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

.hero {
  height: 90vh;
  display: flex;
  align-items: center;
  padding: 40px;
  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url("hero.jpg") center/cover no-repeat;
}

.hero h1 {
  font-size: 3rem;
  max-width: 600px;
}

.section {
  padding: 60px 20px;
}

.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.card h3 {
  padding: 10px;
}

.contact {
  background: #000;
  padding: 40px;
}
</style>
</head>

<body>

<header>
  <h2>Sonsie Carpentry</h2>
  <div>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </div>
</header>

<section class="hero">
  <h1>Premium Renovations & Bathroom Renovations Built Properly</h1>
</section>

<section id="projects" class="section">
  <h2>Projects</h2>

  <div class="projects">

    <div class="card">
      <img src="bathroom3-renovation.jpg">
      <h3>Bathroom Renovation</h3>
    </div>

    <div class="card">
      <img src="header.jpg">
      <h3>Custom Carpentry</h3>
    </div>

    <div class="card">
      <img src="main.jpg">
      <h3>Decking & Outdoor Work</h3>
    </div>

    <div class="card">
      <img src="hero.jpg">
      <h3>Renovation Work</h3>
    </div>

  </div>
</section>

<section id="contact" class="contact">
  <h2>Contact</h2>
  <p>Phone: 0449 738 233</p>
  <p>Email: admin@sonsiecarpentry.com</p>
</section>

</body>
</html>
